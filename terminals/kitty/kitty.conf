# =============================================================================
# kitty.conf - Kitty Terminal Configuration
# =============================================================================
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# =============================================================================
# Fonts
# =============================================================================

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Disable ligatures when cursor is on them
disable_ligatures cursor

# =============================================================================
# Cursor
# =============================================================================

cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# =============================================================================
# Scrollback
# =============================================================================

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# =============================================================================
# Mouse
# =============================================================================

mouse_hide_wait 3.0
url_style curly
open_url_with default
detect_urls yes
copy_on_select clipboard

# =============================================================================
# Terminal Bell
# =============================================================================

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# =============================================================================
# Window Layout
# =============================================================================

window_padding_width 10
hide_window_decorations titlebar-only
confirm_os_window_close 0
remember_window_size yes
initial_window_width 1200
initial_window_height 800

# Background opacity (1.0 = opaque)
background_opacity 0.95

# =============================================================================
# Tab Bar
# =============================================================================

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# =============================================================================
# Color Scheme - Catppuccin Mocha
# =============================================================================

# The basic colors
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8

# =============================================================================
# Shell Integration
# =============================================================================

shell_integration enabled

# =============================================================================
# Keybindings
# =============================================================================

# Clear default shortcuts to start fresh
# clear_all_shortcuts yes

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Font size
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# Scrollback
map cmd+k clear_terminal scrollback active
map cmd+shift+k clear_terminal scroll active

# Tabs
map cmd+t new_tab_with_cwd
map cmd+w close_tab
map cmd+[ previous_tab
map cmd+] next_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Windows (splits)
map cmd+d launch --cwd=current --location=vsplit
map cmd+shift+d launch --cwd=current --location=hsplit
map cmd+shift+w close_window

# Navigate windows
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Resize windows
map ctrl+shift+h resize_window narrower
map ctrl+shift+j resize_window shorter
map ctrl+shift+k resize_window taller
map ctrl+shift+l resize_window wider

# Fullscreen
map cmd+enter toggle_fullscreen

# Reload config
map cmd+shift+, load_config_file

# =============================================================================
# macOS Specific
# =============================================================================

macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_traditional_fullscreen no
macos_titlebar_color background

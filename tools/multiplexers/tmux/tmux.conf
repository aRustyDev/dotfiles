# =============================================================================
# tmux.conf - Terminal Multiplexer Configuration
# =============================================================================
# Managed by dotfiles - see tmux/README.md for details

# Reset keybindings to clean state
source-file ~/.config/tmux/tmux.reset.conf

# =============================================================================
# Core Settings
# =============================================================================

# Terminal settings
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# General settings
set -g base-index 1              # Start window numbering at 1
setw -g pane-base-index 1        # Start pane numbering at 1
set -g detach-on-destroy off     # Don't exit tmux when closing a session
set -g escape-time 0             # No escape delay (important for vim)
set -g history-limit 1000000     # Large scrollback buffer
set -g renumber-windows on       # Renumber windows when one is closed
set -g set-clipboard on          # Use system clipboard
set -g status-position top       # Status bar at top (macOS style)
set -g mouse on                  # Enable mouse support
set -g focus-events on           # Enable focus events for vim

# Vi mode
setw -g mode-keys vi

# =============================================================================
# Keybindings
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+hjkl
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Quick window switching
bind -r Tab last-window

# Copy mode improvements (vi style)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# Appearance
# =============================================================================

# Pane borders
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# =============================================================================
# Plugins (TPM - Tmux Plugin Manager)
# =============================================================================
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Install plugins: prefix + I
# Update plugins: prefix + U

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.1.3'

# FZF integration
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

# =============================================================================
# Plugin Configuration
# =============================================================================

# tmux-resurrect: Save/restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: Auto-save sessions
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# fzf-url: URL picker
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Catppuccin theme configuration
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# Window styling
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag, 󰊓,}"

# Status bar
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Status modules
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

# =============================================================================
# Initialize TPM (keep this at the very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'

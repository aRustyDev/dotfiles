# Meilisearch Configuration Template
# This file is a reference template - actual configs are generated by justfile recipes
#
# Variables:
#   {{host}}  - Listen address (default: 127.0.0.1)
#   {{port}}  - Listen port (default: 7700)
#   $DATA_LOCAL - XDG data directory (~/.local/share)
#
# See: https://www.meilisearch.com/docs/learn/configuration/instance_options

# =============================================================================
# Core Settings
# =============================================================================

# Database location
db_path = "$DATA_LOCAL/meilisearch/data.ms"

# Environment: "development" (no auth required) or "production" (auth required)
env = "development"

# HTTP listener
http_addr = "{{host}}:{{port}}"

# Master key - required in production (16+ byte UTF-8 string)
# In production, use: op://Developer/meilisearch/credential
# master_key = ""

# =============================================================================
# Performance (Optimized for M5 32GB)
# =============================================================================

# Max RAM for indexing operations
max_indexing_memory = "8 GiB"

# Max threads for indexing (M5 has 10-12 performance cores)
max_indexing_threads = 8

# Max HTTP payload size
http_payload_size_limit = "100 MB"

# =============================================================================
# Logging & Telemetry
# =============================================================================

# Log verbosity: OFF, ERROR, WARN, INFO, DEBUG, TRACE
log_level = "INFO"

# Disable anonymous usage analytics
no_analytics = true

# =============================================================================
# Dumps (Manual Backups)
# =============================================================================

dump_dir = "$DATA_LOCAL/meilisearch/dumps/"
ignore_missing_dump = false
ignore_dump_if_db_exists = false

# Import dump on startup:
# import_dump = "./path/to/my/file.dump"

# =============================================================================
# Snapshots (Scheduled Backups)
# =============================================================================

snapshot_dir = "$DATA_LOCAL/meilisearch/snapshots/"

# Enable scheduled snapshots (false, true, or interval in seconds)
# schedule_snapshot = 86400  # Daily
schedule_snapshot = false

ignore_missing_snapshot = false
ignore_snapshot_if_db_exists = false

# Import snapshot on startup:
# import_snapshot = "./path/to/my/snapshot"

# =============================================================================
# SSL/TLS (Production)
# =============================================================================

# Certificate and key paths (generated by mkcert)
# ssl_cert_path = "$DATA_LOCAL/meilisearch/certs/cert.pem"
# ssl_key_path = "$DATA_LOCAL/meilisearch/certs/key.pem"

# Client certificate auth path
# ssl_auth_path = "$DATA_LOCAL/meilisearch/certs/ca"

# OCSP stapling
# ssl_ocsp_path = "$DATA_LOCAL/meilisearch/certs/ocsp"

# Require client certificates
ssl_require_auth = false

# Session resumption (performance)
ssl_resumption = false

# Session tickets (performance)
ssl_tickets = false

# =============================================================================
# Experimental Features
# =============================================================================

# Prometheus metrics at GET /metrics
experimental_enable_metrics = true

# Reduce memory during indexing (slower, less RAM)
experimental_reduce_indexing_memory_usage = false

# Limit batched tasks (default: unlimited)
# experimental_max_number_of_batched_tasks = 100

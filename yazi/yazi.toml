# =============================================================================
# yazi.toml - Yazi File Manager Configuration
# =============================================================================
# Docs: https://yazi-rs.github.io/docs/configuration/yazi

[manager]
# Sorting
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true

# Display
show_hidden = false
show_symlink = true
linemode = "size"

# Scrolloff (keep cursor away from edges)
scrolloff = 5

[preview]
# Preview settings
tab_size = 2
max_width = 1000
max_height = 1000

# Cache
cache_dir = ""

# Image preview (requires ueberzugpp or similar)
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15

# Preview delay (in ms)
# ueberzug_scale = 1
# ueberzug_offset = [0, 0, 0, 0]

[opener]
# Default openers for different file types
edit = [
    { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
    { run = 'open "$@"', desc = "Open", for = "macos" },
    { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]
reveal = [
    { run = 'open -R "$@"', desc = "Reveal in Finder", for = "macos" },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
    { run = 'vlc "$@"', orphan = true, for = "unix" },
]
archive = [
    { run = 'unar "$@"', desc = "Extract here", for = "unix" },
]

[open]
rules = [
    # Folders
    { name = "*/", use = [ "edit", "open", "reveal" ] },

    # Text/Code
    { mime = "text/*", use = [ "edit", "open", "reveal" ] },
    { mime = "application/json", use = [ "edit", "open", "reveal" ] },
    { mime = "application/x-yaml", use = [ "edit", "open", "reveal" ] },
    { mime = "application/toml", use = [ "edit", "open", "reveal" ] },

    # Images
    { mime = "image/*", use = [ "open", "reveal" ] },

    # Videos
    { mime = "video/*", use = [ "play", "open", "reveal" ] },
    { mime = "audio/*", use = [ "play", "open", "reveal" ] },

    # Archives
    { mime = "application/zip", use = [ "archive", "open", "reveal" ] },
    { mime = "application/gzip", use = [ "archive", "open", "reveal" ] },
    { mime = "application/x-tar", use = [ "archive", "open", "reveal" ] },
    { mime = "application/x-bzip2", use = [ "archive", "open", "reveal" ] },
    { mime = "application/x-xz", use = [ "archive", "open", "reveal" ] },
    { mime = "application/x-7z-compressed", use = [ "archive", "open", "reveal" ] },
    { mime = "application/x-rar", use = [ "archive", "open", "reveal" ] },

    # PDFs
    { mime = "application/pdf", use = [ "open", "reveal" ] },

    # Fallback
    { name = "*", use = [ "open", "reveal" ] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912  # 512MB
image_bound = [0, 0]
suppress_preload = false

[plugin]
# Preloaders (run before file is opened)
preloaders = [
    { name = "*", cond = "!mime", run = "mime", multi = true, prio = "high" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
]

# Previewers
previewers = [
    { name = "*/", run = "folder", sync = true },
    { mime = "text/*", run = "code" },
    { mime = "*/xml", run = "code" },
    { mime = "*/javascript", run = "code" },
    { mime = "*/x-wine-extension-ini", run = "code" },
    { mime = "application/json", run = "json" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
    { mime = "application/zip", run = "archive" },
    { mime = "application/gzip", run = "archive" },
    { mime = "application/x-tar", run = "archive" },
    { mime = "application/x-bzip", run = "archive" },
    { mime = "application/x-bzip2", run = "archive" },
    { mime = "application/x-7z-compressed", run = "archive" },
    { mime = "application/x-rar", run = "archive" },
    { mime = "application/x-xz", run = "archive" },
    { name = "*", run = "file" },
]

[input]
cd_title = "Change directory:"
create_title = "Create:"
rename_title = "Rename:"
trash_title = "Move {n} file(s) to trash? (y/N)"
delete_title = "Delete {n} file(s) permanently? (y/N)"
filter_title = "Filter:"
find_title = ["Find next:", "Find previous:"]
search_title = "Search via {n}:"
shell_title = ["Shell:", "Shell (block):"]
overwrite_title = "Overwrite file? (y/N)"
quit_title = "Quit? (y/N)"

[select]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "none"
sort_sensitive = false
sort_reverse = false
sort_translit = false

[log]
enabled = false
